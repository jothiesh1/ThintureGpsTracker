<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" type="text/css" th:href="@{/css/style.css}">
    <title>THINTURE - Add New Dealer</title>
    <style>
		body {
				    font-family: Arial, sans-serif;
				    background-image: url('THINTURE_IMAGE/feet.jpg');
				    background-size: cover;
				    background-repeat: no-repeat;
				    margin: 0;
				    padding: 0;
				}

				.container {
				    width: 20%;
				    max-width: 900px;
				    margin: 150px auto;
				    padding: 30px;
				   background: linear-gradient(135deg, #74ebd5, gray); 
				    border: 1px solid #ddd;
				    border-radius: 10px;
				    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
				   
				}

				h2 {
					text-align: center;
					           font-size: 2em; /* Adjust size as needed */
					           font-weight: 700;
					           color: SILVER; /* Text color */
					           text-shadow: 
					               1px 1px 2px rgba(0, 0, 0, 0.7), /* First shadow for initial depth */
					               3px 3px 5px rgba(0, 0, 0, 0.3), /* Slightly darker shadow for increased depth */
					               6px 6px 8px rgba(0, 0, 0, 0.3); /* Darker shadow for stronger 3D effect */
					       }

				.form-group {
				    margin-bottom: 20px;
				    display: grid;
				    grid-template-columns: 1fr 2fr;
				    gap: 10px;
				}

				.form-group label {
				    display: block;
				    font-weight: bold;
				    color: #555;
				}

				.form-group input[type="text"],
				.form-group input[type="email"],
				.form-group input[type="tel"],
				.form-group input[type="password"] {
				    padding: 12px;
				    border: 2px solid #ddd;
				    border-radius: 6px;
				    font-size: 14px;
				    box-sizing: border-box;
					width: 60%;
					height:5px;
				}

				.form-group input[type="submit"] {
				    width: auto; /* Adjust width to content size */
				    padding: 12px 20px; /* Adjust padding as needed */
				    background-color: darkblue
					;
				    color: white;
				    border: none;
				    border-radius: 10px;
				    font-size: 14px;
				    cursor: pointer;
				    transition: background-color 0.3s ease;
				  position: absolute;
				    right: 800px; /* Align to the right edge of the container */
				  
					
				}
				.form-group input[type="submit"]:hover {
				    background-color: #0056b3;
				}

				.back-btn {
				    display: inline-block;
				    padding: 12px 20px;
				    color: white;
				    background-color:darkblue;
				    border: none;
				    border-radius: 6px;
				    cursor: pointer;
				    text-decoration: none;
				    font-size: 14px;
				    margin-bottom: 20px;
				    transition: background-color 0.3s ease;
				}

				.back-btn:hover {
				    background-color: #0056b3;
				}
				/* Red border for invalid inputs */
				input.error { border: 2px solid red !important; /* Force red border */ } /* Error message styling */ .error-message { color: red; font-size: 12px; margin-top: 2px; }

    </style>
</head>
<body>
	<div th:insert="navigation :: navbar"></div>
    <div class="container">
        <h2>ADD DEALER</h2>
        <a href="/dashboard" class="back-btn">Back</a> <!-- Redirects to dashboard -->
		<form action="/dealers/add" method="post">

            <div class="form-group">
                <label for="companyName">Company Name</label>
                <input type="text" id="companyName" name="companyName" >
				<span class="error-message" id="companyName-error"></span>
            </div>
            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" >
				<span class="error-message" id="address-error"></span>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" >
				<span class="error-message" id="email-error"></span>
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" >
				<span class="error-message" id="phone-error"></span>
            </div>
            <div class="form-group">
                <label for="country">Country</label>
                <input type="text" id="country" name="country" >
				<span class="error-message" id="country-error"></span>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" >
				<span class="error-message" id="password-error"></span>
            </div>
            <div class="form-group">
                <label for="c_password">Confirm Password</label>
                <input type="password" id="c_password" name="c_password" >
				<span class="error-message" id="c_password-error"></span>
            </div>

            <div class="form-group">
                <input type="submit" value="Add Dealer">
            </div>
        </form>
    </div>

	<script>
	    document.querySelector('form').addEventListener('submit', function(event) {
	        event.preventDefault();

	        // Clear any previous errors
	        document.querySelectorAll('input').forEach(input => input.classList.remove('error'));

	        const companyNameInput = document.getElementById('companyName');
	        const addressInput = document.getElementById('address');
	        const emailInput = document.getElementById('email');
	        const phoneInput = document.getElementById('phone');
	        const countryInput = document.getElementById('country');
	        const passwordInput = document.getElementById('password');
	        const confirmPasswordInput = document.getElementById('c_password');

	        const companyName = companyNameInput.value;
	        const address = addressInput.value;
	        const email = emailInput.value;
	        const phone = phoneInput.value;
	        const country = countryInput.value;
	        const password = passwordInput.value;
	        const confirmPassword = confirmPasswordInput.value;

	        let isValid = true; // Flag to check if the form is valid

	        // Simple validation and adding red border
	        if (companyName.trim() === '') {
	            companyNameInput.classList.add('error');
	            isValid = false;
	        }
	        if (address.trim() === '') {
	            addressInput.classList.add('error');
	            isValid = false;
	        }
	        if (!/^\S+@\S+\.\S+$/.test(email)) {
	            emailInput.classList.add('error');
	            isValid = false;
	        }
	        if (phone.trim() === '') {
	            phoneInput.classList.add('error');
	            isValid = false;
	        }
	        if (country.trim() === '') {
	            countryInput.classList.add('error');
	            isValid = false;
	        }
	        if (password !== confirmPassword || password.trim() === '') {
	            passwordInput.classList.add('error');
	            confirmPasswordInput.classList.add('error');
	            alert('Passwords do not match!');
	            isValid = false;
	        }

	        if (!isValid) {
	            return; // Stop form submission if any fields are invalid
	        }

	        const data = {
	            companyName,
	            address,
	            email,
	            phone,
	            country,
	            password
	        };

	        fetch('http://localhost:8181/dealers/add', {
	            method: 'POST',
	            headers: {
	                'Content-Type': 'application/json'
	            },
	            body: JSON.stringify(data)
	        })
	        .then(response => {
	            if (response.ok) {
	                alert('Dealer added successfully!');
	                window.location.href = '/dashboard';
	            } else {
	                return response.text().then(text => { throw new Error(text) });
	            }
	        })
	        .catch(error => {
	            console.error('Error adding dealer:', error);
	            alert('Error adding dealer.');
	        });
	    });

	    // Add input event listeners to remove the error class when typing
	    document.querySelectorAll('input').forEach(input => {
	        input.addEventListener('input', function() {
	            input.classList.remove('error');
	        });
	    });

	    // CSS class for red border when there is an error
	    const style = document.createElement('style');
	    style.innerHTML = `
	        input.error {
	            border: 2px solid red;
	        }
	    `;
	    document.head.appendChild(style);
	</script>


</body>


</body>
</html>
