<!-- src/main/resources/templates/fragments/navigation.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Navigation</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .container-header {
            padding: 20px;
            font-size: 10px;
            background-color: gray;
            margin-left: 10px;
        }

        .navbar {
            background-color: lightgray;
            color: white;
            padding: 10px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 600px; /* Adjust as needed */
            margin: 0 auto;
            height: 55px;
            margin-top: -25px;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
        }

        .navbar-brand img {
            height: 30px;
            margin-right: 10px;
        }

        .navbar-menu, .navbar-end {
            display: flex;
            align-items: center;
        }

        .navbar-menu a, .navbar-end a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        .navbar-menu a:hover, .navbar-end a:hover {
            text-decoration: underline;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: white;
            box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            width: 200px;
        }

        .dropdown-content a:hover {
            background-color: #f1f1f1;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .navbar-logo {
            width: 190px;
            height: 60px;
        }
    </style>
</head>
<body>
    <div class="container-header">
        <br>
        <div class="header">
            <img src="THINTURE_IMAGE/logo2.jpg" alt="THINTURE Logo" class="navbar-logo">
        </div>
    </div>
    <div class="navbar">
        <a href="details.html" class="active"><i class="fas fa-home"></i> Dashboard</a>
        <a href="#"><i class="fas fa-map"></i> Map</a>
        <div class="dropdown">
            <a href="#"><i class="fas fa-th-large"></i> View</a>
            <div class="dropdown-content">
                <a href="total-users.html">Users</a>
                <a href="total-vehicles.html">Vehicle</a>
                <a href="tracking_details.html">Tracking Details</a>
                <a href="#">Calendar</a>
            </div>
        </div>
        <div class="dropdown">
            <a href="#"><i class="fas fa-th-large"></i> Utility</a>
            <div class="dropdown-content">
                <a href="#">Support & Feedback</a>
                <a href="#">Announcement</a>
                <a href="#">Send Notification</a>
            </div>
        </div>
        <div class="dropdown">
            <a href="#"><i class="fas fa-th-large"></i> Accounts</a>
            <div class="dropdown-content">
                <a href="#">Renewal</a>
            </div>
        </div>
        <a href="#"><i class="fas fa-th-large"></i>Profile</a>
    </div>
</body>
</html>
