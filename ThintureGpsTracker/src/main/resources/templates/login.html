<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fleet Thinture - Login</title>
    
	<style>
	       body {
	           margin: 0;
	           font-family: 'Arial', sans-serif;
	           color: #333;
	           height: 100vh;
	           display: flex;
	           align-items: center;
	           justify-content: center;
	           background-image: url('/THINTURE_IMAGE/fleet.jpg');
	           background-size: cover;
	           background-position: center;
	         
	       }

	       .container {
	           display: flex;
	           justify-content: space-between;
	           padding: 10px;
	           max-width: 900px;
	           margin: auto;
			   height:500px;
	           border-radius: 15px;
	           box-shadow: 0 4px 20px rgba(0, 0, 0, 0.9);
	           backdrop-filter: blur(10px);
	       }

		   .left-section, .right-section {
		       background: linear-gradient(135deg,#ffffff,#e2e2e2);
		       padding: 30px;
		       border-radius: 15px;
		       box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
		       flex: 1;
		       margin: 5px;
		       position: relative;
		       color: #2c3e50; /* Darker text for better contrast */
		   }


	       .header img {
	           height: 50px;
	           width:150;
	           margin-bottom: 20px;
	           z-index: 1;
	           position: relative;
	       }

	       .header p {
	           font-size: 1.2em;
	           margin: 10px 0;
	           z-index: 1;
	           position: relative;
	       }

	       .content {
	           margin-top: 20px;
	           z-index: 1;
	           position: relative;
	       }

	       .main-image {
	           width: 100%;
	           height: auto;
	           border-radius: 10px;
	           animation: fadeIn 1s;
	           z-index: 1;
	           position: relative;
	       }

	       .login-container {
	           text-align: center;
	           padding: 10px;
			   top:70px;
	           border-radius: 10px;
	           z-index: 1;
			   background: linear-gradient(135deg,#ffffff,gray);
	           position: relative;
	           width: 20%;
	           height: 70%;
	           min-width: 280px;
	           box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
	           right: -12%;
			   font-size: 18px;
	       }

	       .login-container label {
	           display: block;
	           text-align: left;
	           margin-top: 15px;
	           font-weight: bold;
	           color: #2c3e50; /* Label color */
	           padding: 1px;
	       }

	       .login-container input,
	       .login-container select {
	           width: 50%;
	           padding:2px;
	           margin-top: 5px;
	           margin-bottom: 3px;
	           border: 1px solid #ccc; /* Border color */
	           border-radius: 7px;
	           font-size: 1em;
	           transition: border-color 0.3s ease;
	       }

	       .login-container input:focus,
	       .login-container select:focus {
	           border-color:darkblue; /* Focus color */
	           outline: none;
	       }

	       .login-container button {
	           width: 50%;
	           padding: 2px;
	           background-color:darkblue;
	           color: white;
	           border: none;
	           border-radius: 2px;
	           font-size:18px;
	           cursor: pointer;
	           transition: background-color 0.3s ease, transform 0.2s ease;
	       }

	       h2 {
	           text-align: center;
	           font-size: 1.5em; /* Adjust size as needed */
	           font-weight: 650;
	           color:lightseagreen; /* Text color */
	           text-shadow: 
	               1px 1px 2px rgba(0, 0, 0, 0.8), /* First shadow for initial depth */
	               3px 3px 5px rgba(0, 0, 0, 0.8), /* Slightly darker shadow for increased depth */
	               6px 6px 8px rgba(0, 0, 0, 0.1); /* Darker shadow for stronger 3D effect */
	       }

	       p {
	           text-align: center;
	           font-size: 1em; /* Adjust size as needed */
	           font-weight: 200;
	           color: black; /* Text color */
	           text-shadow: 
	               1px 1px 2px rgba(0, 0, 0, 0.8), /* First shadow for initial depth */
	               3px 3px 5px rgba(0, 0, 0, 0.3), /* Slightly darker shadow for increased depth */
	               6px 6px 8px rgba(0, 0, 0, 0.3); /* Darker shadow for stronger 3D effect */
	       }

	       .login-container button:hover {
	           background-color: #2980b9;
	           transform: translateY(-2px); /* Button hover effect */
	       }

	       .forgot-password {
	           display: block;
	           text-align: right;
	           margin-top: 10px;
	           color: darkblue;
	           text-decoration: none;
	           font-size: 0.9em;
	       }

	       .forgot-password:hover {
	           text-decoration: underline;
	       }

	       .additional-info {
	           margin-top: 20px;
	           color: #333;
	           font-size: 1em;
	           text-align: left;
	       }

	       .error {
	           color: red;
	           font-size: 0.9em;
	           margin-top: -10px;
	           margin-bottom: 10px;
	           display: none; /* Initially hidden */
	       }

	       @media (max-width: 768px) {
	           .container {
	               flex-direction: column;
	               align-items: center;
	           }

	           .left-section, .right-section {
	               width: 100%;
	               margin: 10px 0;
	           }
	       }

	       @keyframes fadeIn {
	           from { opacity: 0; }
	           to { opacity: 1; }
	       }
		   .ribbon {
		       position: relative;
		       background: darkblue; /* Ribbon color */
		       color: white; /* Text color */
		       padding: 10px 20px; /* Padding around text */
		       text-align: center;
		       font-weight: bold;
		       border-radius: 5px; /* Rounded corners */
		   }

		   .ribbon:before,
		   .ribbon:after {
		       content: "";
		       position: absolute;
		       bottom: 100%; /* Position above the ribbon */
		       left: 0;
		       border-left: 10px solid transparent; /* Left triangle */
		       border-right: 10px solid transparent; /* Right triangle */
		   }

		   .ribbon:before {
		       border-bottom: 10px solid darkblue; /* Color of the left triangle */
		   }

		   .ribbon:after {
		       border-bottom: 10px solid darkblue; /* Color of the right triangle */
		       right: 0;
		       left: auto; /* Remove left positioning */
		   }

	   </style>
</head>
<body>
    <div class="container">
        <div class="left-section">
            <div class="header">
                <img src="/THINTURE_IMAGE/thinture.jpg" alt="THINTURE Logo" class="img">
                <p>Welcome to the Thinture Fleet Monitoring System. Our advanced platform allows you to track, monitor, and manage your vehicles efficiently. Please log in to access your personalized dashboard.</p>
            </div>
            <div class="content">
				<img src="/THINTURE_IMAGE/live_tracking3-1-1.gif" alt="Logistic" class="main-image"/>
            
               
            </div>
        </div>
        <div class="right-section">
            <div class="login-container">
                
                <h2>Think Future!</h2>
				
				

				<form th:action="@{/login}" method="post" onsubmit="return validateForm()">
				    <label for="usertype"></label>
				    <select id="usertype" name="usertype" required>
				        
						<option value="SUPERADMIN">SuperAdmin</option>
						<option value="ADMIN">Admin</option>
						<option value="DEALER">Dealer</option>
						<option value="USER">User</option>
				        <option value="CLIENT">Client</option>
				    </select>
				    <div id="usertype-error" class="error"></div>

				    
				    <input type="text" id="username" name="username" placeholder="Username" >
				    <div id="username-error" class="error"></div>

				  
				    <input type="password" id="password" name="password" placeholder="Password">
				    <div id="password-error" class="error"></div>

				    <button type="submit">Log In</button>
				    <a href="#" class="forgot-password">Forgot Password?</a>
				</form>

            </div>
            
        </div>
    </div>
	<script>
		
		function validateForm() {
				              // Hide all error messages initially
				              document.querySelectorAll('.error').forEach(error => error.style.display = 'none');

				              // Reset all input borders to default
				              document.querySelectorAll('input, select').forEach(input => {
				                  input.style.borderColor = ''; // Reset border color
				              });

				              let isValid = true;

				              // Validate user type
				              const usertype = document.getElementById('usertype');
				              if (usertype.value === '') {
				                  document.getElementById('usertype-error').style.display = 'block';
				                  usertype.style.borderColor = 'red'; // Set border color to red
				                  isValid = false;
				              }

				              // Validate username
				              const username = document.getElementById('username');
				              if (username.value.trim() === '') {
				                  document.getElementById('username-error').style.display = 'block';
				                  username.style.borderColor = 'red'; // Set border color to red
				                  isValid = false;
				              }

				              // Validate password
				              const password = document.getElementById('password');
				              if (password.value.trim() === '') {
				                  document.getElementById('password-error').style.display = 'block';
				                  password.style.borderColor = 'red'; // Set border color to red
				                  isValid = false;
				              }

				              return isValid; // Prevent form submission if invalid
				          }
						  
						  
						  
						  
						  
		
	       function logLoginAttempt() {
	           var usertype = document.getElementById("usertype").value;
	           var username = document.getElementById("username").value;
	           console.log("Login attempt for user: " + username + " with user type: " + usertype);
	       }
		   
		   
		   
	   </script>
</body>
</html>
