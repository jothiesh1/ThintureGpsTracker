<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fleet Thinture</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}">
    <style>
        /* CSS styles */
        body {
            background-color: #047A0B;
            margin: 0; /* Ensure there's no margin around the body */
        }
        .container {
            display: flex;
            justify-content: space-between;
            padding: 20px;
        }
        .left-section, .right-section {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .left-section {
            width: 50%;
        }
        .right-section {
            width: 30%;
        }
        .header h1 {
            color: #047A0B;
        }
        .main-image {
            width: 100%;
            height: auto;
        }
        .login-container {
            margin-top: 20px;
        }
        .login-container h2 {
            color: #047A0B;
        }
        .login-container label {
            display: block;
            margin-top: 10px;
        }
        .login-container input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .login-container button {
            width: 100%;
            padding: 10px;
            background-color: #047A0B;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .login-container button:hover {
            background-color: #036A09;
        }
        .forgot-password {
            display: block;
            text-align: right;
            margin-top: 10px;
            color: #047A0B;
            text-decoration: none;
        }
        .forgot-password:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-section">
            <div class="header">
                <h1>Fleet Thinture </h1>
                <p>Stop Searching self hosted GPS Software</p>
            </div>
            <div class="content">
                <img src="car_image.png" alt="Car" class="main-image"/>
                <p class="title"> logistics</p>
                <p class="description">Automate your business through cutting-edge IOT automation tool</p>
            </div>
        </div>
        <div class="right-section">
            <div class="login-container">
                <h2>Welcome to Fleet Thinture!</h2>
                <p>Sign in as a User or Admin</p>
                <form th:action="@{/login}" method="post">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                    <button type="submit">Log In</button>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </form>
                <form th:action="@{/register}" method="post">
                    <label for="register-username">New Username</label>
                    <input type="text" id="register-username" name="username" required>
                    <label for="register-password">New Password</label>
                    <input type="password" id="register-password" name="password" required>
                    <button type="submit">Register</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
