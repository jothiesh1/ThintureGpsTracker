<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map with Speedometer and Moving Car</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        /* Set the map container */
        #map {
            height: 100vh;
            width: 100%;
        }

        /* Speedometer container on the map */
        #speedometer-container {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 200px;
            height: 200px;
            z-index: 1000; /* Ensure it is above the map */
            background-color: rgba(255, 255, 255, 0.8); /* Semi-transparent background */
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        /* Ensure the speedometer is displayed properly */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div id="map"></div>
<!-- Speedometer Container -->
<div id="speedometer-container">
    <canvas id="speedometer" width="180" height="180"></canvas> <!-- Canvas element for Gauge.js -->
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gauge.js/dist/gauge.min.js"></script>
<script>
    // Initialize the map
    var map = L.map('map').setView([51.505, -0.09], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Car icon marker setup
    var carIcon = L.icon({
        iconUrl: 'https://img.icons8.com/ios-filled/50/000000/car--v1.png', // Use any car icon you want
        iconSize: [40, 40],
        iconAnchor: [20, 20], // Point to place icon at the correct location
    });

    // Add the car marker to the map at an initial position
    var carMarker = L.marker([51.505, -0.09], { icon: carIcon }).addTo(map);

    // Speedometer setup using Gauge.js
    var opts = {
        angle: 0.15, // The span of the gauge (adjust for visual appearance)
        lineWidth: 0.44, // Thickness of the gauge arc
        radiusScale: 1, // Relative radius
        pointer: {
            length: 0.6, // Relative to gauge radius
            strokeWidth: 0.035, // Thickness of the pointer
            color: '#000000' // Pointer color
        },
        limitMax: false,     // If false, max value increases automatically if value > maxValue
        limitMin: false,     // If true, the min value of the gauge will be fixed
        colorStart: '#6FADCF',   // Colors for the gauge arc
        colorStop: '#8FC0DA',    // just experiment with them
        strokeColor: '#E0E0E0',  // Stroke color
        generateGradient: true,
        highDpiSupport: true,     // High resolution support
    };

    // Select the canvas element for the speedometer
    var target = document.getElementById('speedometer');

    // Create the gauge object
    var gauge = new Gauge(target).setOptions(opts);
    gauge.maxValue = 180; // Set maximum speed (e.g., 180 km/h)
    gauge.setMinValue(0);  // Set minimum speed (0 km/h)
    gauge.animationSpeed = 32; // Animation speed
    gauge.set(50); // Set the initial/default value to 50

    // Function to simulate car movement
    var lat = 51.505;
    var lng = -0.09;
    
    function moveCar(newLat, newLng, speed) {
        // Move the car marker
        carMarker.setLatLng([newLat, newLng]);
        
        // Update the speedometer
        gauge.set(speed);
        
        // Keep the map centered on the moving car
        map.panTo([newLat, newLng]);
    }

    // Simulate the car movement and speed updates
    setInterval(function() {
        var randomSpeed = Math.floor(Math.random() * 180); // Simulate a speed between 0 and 180
        lat += (Math.random() - 0.5) * 0.001; // Simulate slight movement in latitude
        lng += (Math.random() - 0.5) * 0.001; // Simulate slight movement in longitude
        
        moveCar(lat, lng, randomSpeed); // Move car and update speedometer
    }, 2000); // Update every 2 seconds

</script>
</body>
</html>
