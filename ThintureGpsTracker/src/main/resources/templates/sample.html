    <script>
        // Initialize the map
        var map = L.map('map').setView([12.9715987, 77.594566], 13);

        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 20
        }).addTo(map);

        // Function to get the car icon based on status
        function getCarIcon(status) {
            var ringClass = status === 'N1' ? 'ring-blink-red' : 'ring-blink-green';
            return L.divIcon({
                className: 'custom-icon ring-blink ' + ringClass,
                html: `
                    <div class="ring-blink">
                        <img src="${status === 'N1' ? 'THINTURE_IMAGE/red2.png' : 'THINTURE_IMAGE/greencar2.png'}" alt="car-icon" class="car-icon">
                    </div>
                `,
                iconSize: [50, 50],
                iconAnchor: [25, 25],
                popupAnchor: [0, -25]
            });
        }

        // Initialize markers storage
        var carMarkers = {};

        // Function to update car location
        function updateCarLocation(data) {
            var { id, lat, lng, status, startPoint, endPoint } = data;
            var carIcon = getCarIcon(status);

            if (carMarkers[id]) {
                carMarkers[id].setLatLng([lat, lng]);
                carMarkers[id].setIcon(carIcon);
            } else {
                carMarkers[id] = L.marker([lat, lng], { icon: carIcon }).addTo(map);
            }

            if (status === 'N2') {
                getRouteAndAnimate(startPoint, endPoint, id);
            }
        }

        // Function to fetch and animate the car along the route
        function getRouteAndAnimate(start, end, carId) {
            var osrmURL = `https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`;

            fetch(osrmURL)
                .then(response => response.json())
                .then(data => {
                    if (!data.routes || data.routes.length === 0) {
                        console.error('No routes found');
                        return;
                    }

                    var route = data.routes[0].geometry.coordinates;
                    var latLngRoute = route.map(coord => [coord[1], coord[0]]);

                    // Add the route as a polyline on the map
                    L.polyline(latLngRoute, {
                        color: 'blue',
                        weight: 5,
                        opacity: 0.7
                    }).addTo(map);

                    // Animate the car along the route
                    if (carMarkers[carId]) {
                        animateCar(carMarkers[carId], latLngRoute);
                    } else {
                        console.error('Car marker not found for ID:', carId);
                    }
                })
                .catch(error => {
                    console.error('Error fetching route:', error);
                });
        }

        function animateCar(carMarker, route) {
            let index = 0;
            let startTime = null;

            function moveCar(timestamp) {
                if (!startTime) startTime = timestamp;

                if (index < route.length - 1) {
                    let currentPoint = route[index];
                    let nextPoint = route[index + 1];

                    // Calculate distance and duration to move between points
                    let distance = map.distance(currentPoint, nextPoint);
                    let moveDuration = distance / 80 * 1000; // Speed (pixels per second) in milliseconds
                    let elapsedTime = timestamp - startTime;
                    let fraction = Math.min(elapsedTime / moveDuration, 1);

                    // Calculate new position
                    let latLng = [
                        currentPoint[0] + fraction * (nextPoint[0] - currentPoint[0]),
                        currentPoint[1] + fraction * (nextPoint[1] - currentPoint[1])
                    ];

                    // Set marker position and rotation
                    carMarker.setLatLng(latLng);
                    carMarker.setIcon(L.divIcon({
                        className: 'custom-icon ring-blink ring-blink-green',
                        html: `<div style="transform: rotate(${calculateAngle(currentPoint, nextPoint)}deg);">
                                <img src="THINTURE_IMAGE/greencar2.png" class="car-icon">
                            </div>`,
                        iconSize: [38, 38],
                        iconAnchor: [19, 19]
                    }));

                    if (fraction < 1) {
                        requestAnimationFrame(moveCar);
                    } else {
                        startTime = null; // Reset startTime for the next segment
                        index++;
                        setTimeout(() => requestAnimationFrame(moveCar), 100); // Adjust delay between segments
                    }
                } else {
                    // Ensure final position is set
                    carMarker.setLatLng(route[route.length - 1]);
                    carMarker.setIcon(getCarIcon('N2'));
                }
            }

            requestAnimationFrame(moveCar);
        }

        // Helper function to calculate angle between two points
        function calculateAngle(startPoint, endPoint) {
            return Math.atan2(endPoint[1] - startPoint[1], endPoint[0] - startPoint[0]) * 180 / Math.PI;
        }

        // Function to fetch history data and load video
        function fetchHistory() {
            var carId = document.getElementById('car-id').value;
            var startDate = document.getElementById('start-date').value;
            var endDate = document.getElementById('end-date').value;

            if (!carId || !startDate || !endDate) {
                alert('Please fill in all fields.');
                return;
            }

            // Log the selected date and time range for verification
            console.log('Car ID:', carId);
            console.log('Start Date and Time:', startDate);
