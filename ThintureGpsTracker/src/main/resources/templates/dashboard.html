<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thinture Fleet Dashboard</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .header {
            background-color: #4B9CD3;
            color: white;
            padding: 10px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            background-color: #4B9CD3;
            padding: 10px;
            color: white;
        }
        .navbar .menu {
            display: flex;
            gap: 15px;
        }
        .navbar .menu a {
            color: white;
            text-decoration: none;
        }
        .content {
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .dashboard-header h2 {
            margin: 0;
        }
        .dashboard-header .actions {
            display: flex;
            gap: 10px;
        }
        .dashboard-header .actions button {
            padding: 5px 10px;
            border: none;
            background-color: #4B9CD3;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        .cards {
            display: flex;
            gap: 20px;
        }
        .card {
            background-color: #047A0B;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: background-color 0.3s ease;
            text-decoration: none;
            color: white;
        }
        .card:hover {
            background-color: #036A09;
        }
        .card h3 {
            margin: 0 0 10px;
            font-size: 1.2em;
        }
        .card p {
            margin: 5px 0;
        }
        #map {
            width: 100%;
            height: 400px;
            margin-top: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .new-section {
            background-color: #0c4a1c;
            padding: 20px;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="THINTURE_IMAGE/logo2.jpg" alt="THINTURE Logo" class="navbar-logo">
    </div>
    <div class="navbar">
        <div class="menu">
            <a href="/dashboard">Dashboard</a>
            <a href="/map">Map</a>
            <a href="#">Utility</a>
            <a href="#">Accounts</a>
            <a href="#">Settings</a>
        </div>
        <div class="user">
            <span>Thinture Technologies Pvt. Ltd!</span>
            <img src="user_icon.png" alt="User" style="width:30px; height:30px; border-radius:50%;">
        </div>
    </div>
    <div class="content">
        <div class="dashboard-header">
            <h2>Analytics Dashboard</h2>
            <div class="actions">
                <button>Verify Email</button>
                <button>Request Credit</button>
            </div>
        </div>
        <div class="cards">
            <a href="total-vehicles.html" class="card">
                <h3>Total Vehicles</h3>
                <p>11</p>
                <p>2 New This Month</p>
            </a>
            <a href="total-users.html" class="card">
                <h3>All Users</h3>
                <p>1</p>
                <p>0 New This Month</p>
            </a>
            <a href="total-expire.html" class="card">
                <h3>Vehicle Expiring</h3>
                <p>0</p>
                <p>0 in next 30 days</p>
            </a>
            <a href="total-payment.html" class="card">
                <h3>Payments Pending</h3>
                <p>₹ 181</p>
                <p>Current Month</p>
            </a>
        </div>
    </div>
    <script th:inline="javascript">
        /*<![CDATA[*/
        /*[[${mapScript}]]*/
        /*]]>*/
    </script>
</body>
</html>
