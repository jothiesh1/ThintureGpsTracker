    <!-- Scripts for Map and Functions -->
	<script>
	    // Initialize the map
	    var map = L.map('map').setView([12.225284, 79.074699], 5);

	    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
	        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
	    }).addTo(map);

	    // Marker cluster group
	    var markers = L.markerClusterGroup({
	        maxClusterRadius: 50,
	        disableClusteringAtZoom: 16
	    });

	    map.addLayer(markers);

	    // Dictionary to hold markers and route layers by deviceID
	    var markerDict = {};
	    var routeLayers = {};

	    // Function to get the car icon based on the status
	    function getCarIcon(status) {
	        var ringClass = status === 'N2' ? 'ring-blink-red' : 'ring-blink-green';
	        return L.divIcon({
	            className: 'custom-icon ring-blink ' + ringClass,
	            html: `
	                <div class="ring-blink">
	                    <img src="${status === 'N2' ? 'THINTURE_IMAGE/red2.png' : 'THINTURE_IMAGE/greencar2.png'}" alt="car-icon" style="width: 38px; height: 38px;">
	                </div>
	            `,
	            iconSize: [38, 38],
	            iconAnchor: [19, 19],
	            popupAnchor: [0, -19]
	        });
	    }

	    // Function to create or update a marker
	    function createOrUpdateMarker(vehicle) {
	        if (!vehicle.latitude || !vehicle.longitude) {
	            console.error('Invalid latitude or longitude for vehicle:', vehicle);
	            return;
	        }

	        var icon = getCarIcon(vehicle.status);
	        var popupContent = `
	            <strong>Device ID:</strong> ${vehicle.deviceId || 'Unknown'}<br>
	            <strong>Timestamp:</strong> ${vehicle.timestamp}<br>
	            <strong>Address:</strong> ${vehicle.address || 'Address not available'}<br>
	            <strong>Latitude:</strong> ${vehicle.latitude}<br>
	            <strong>Longitude:</strong> ${vehicle.longitude}
	        `;

	        if (markerDict[vehicle.deviceId]) {
	            // Update existing marker
	            markerDict[vehicle.deviceId].setLatLng([vehicle.latitude, vehicle.longitude])
	                .setIcon(icon)
	                .bindPopup(popupContent)
	                .openPopup();
	        } else {
	            // Create new marker
	            markerDict[vehicle.deviceId] = L.marker([vehicle.latitude, vehicle.longitude], { icon: icon })
	                .bindPopup(popupContent);
	            markers.addLayer(markerDict[vehicle.deviceId]);
	        }
	    }

	    // Fetch all vehicle data and update markers
	    fetch('/api/vehicles/last-known')
	        .then(response => response.json())
	        .then(data => {
	            console.log('Fetched data:', data); // Log the fetched data

	            if (Array.isArray(data)) {
	                data.forEach(vehicle => {
	                    console.log('Processing vehicle:', vehicle); // Log each vehicle data
	                    createOrUpdateMarker(vehicle); // Create or update marker for each vehicle
	                });
	            } else {
	                console.error('Data is not an array or no data available');
	            }
	        })
	        .catch(error => console.error('Error fetching vehicle data:', error));
			// WebSocket connection for real-time updates
			    var socket = new SockJS('/gs-guide-websocket');
			    var stompClient = Stomp.over(socket);

			    stompClient.connect({}, function (frame) {
			        stompClient.subscribe('/topic/location-updates', function (locationUpdate) {
			            var data = JSON.parse(locationUpdate.body);

			            // Update marker with the new data received via WebSocket
			            createOrUpdateMarker(data);

			            // Optionally center the map on the updated marker
			            map.setView([parseFloat(data.latitude), parseFloat(data.longitude)], 13);
			        });
			    });
	</script>
