<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fleet Thinture Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.5.0/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .header {
            background-color: #047A0B;
            color: white;
            padding: 10px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
        }
        .header .right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .content {
            padding: 0;
        }
        #map {
            width: 100%;
            height: calc(100vh - 120px); /* Adjust height to fit screen */
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div th:replace="fragments/navigation :: *"></div>
    <div class="header">
        <h1> Thinture Technology </h1>
        <div class="right">
            <span>Revitstone Private Limited</span>
            <img src="user_icon.png" alt="User">
        </div>
    </div>
    <div class="content">
        <div id="map"></div>
    </div>
    <script th:inline="javascript">
        /*<![CDATA[*/
        var map = L.map('map').setView([12.225284, 79.074699], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        var marker = L.marker([12.225284, 79.074699]).addTo(map)
            .bindPopup('Location: Tiruvannamalai<br> Latitude: 12.225284<br> Longitude: 79.074699')
            .openPopup();

        var socket = new SockJS('/gs-guide-websocket');
        var stompClient = Stomp.over(socket);

        stompClient.connect({}, function (frame) {
            stompClient.subscribe('/topic/location-updates', function (locationUpdate) {
                var data = JSON.parse(locationUpdate.body);
                var lat = parseFloat(data.latitude);
                var lon = parseFloat(data.longitude);

                marker.setLatLng([lat, lon])
                    .bindPopup('Device ID: ' + data.deviceID + '<br>Timestamp: ' + data.timestamp)
                    .openPopup();

                map.setView([lat, lon], 13);
            });
        });
        /*]]>*/
    </script>
</body>
</html>
