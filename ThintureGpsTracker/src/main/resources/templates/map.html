<body>

	<!-- Replay Panel -->
	    <div id="replay-panel" style="display: none;">
	        <div>
	            <label for="from-date">From:</label>
	            <input type="date" id="from-date">
	            <label for="to-date">To:</label>
	            <input type="date" id="to-date">

	        </div>

	            <label>
	                <input type="checkbox" id="show-trail"> Trail
	            </label>
	            <select id="replay-speed">
	                <option value="normal">Normal</option>
	                <option value="fast">Fast</option>
	                <option value="slow">Slow</option>
	            </select>
	        </div>
	        <div>
	            <button id="play-replay">Play</button>
	            <input type="range" id="replay-slider" min="0" max="100" value="0" style="width: 70%;">
	            <span id="replay-time">00:00:00</span>
	        </div>
	    </div>
	    
	    <div id="map"></div>

	    <script>
	        // Initialize the map
	        var map = L.map('map').setView([12.225284, 79.074699], 5);

	        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
	            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
	        }).addTo(map);

	        var markers = L.markerClusterGroup({
	            maxClusterRadius: 50,
	            disableClusteringAtZoom: 16
	        });
	        map.addLayer(markers);

	        var carMarkers = {};
	        var markerDict = {};
	        var liveDevices = new Set();
	        var deviceLastUpdate = {};
	        var inactivityThreshold = 30000;
	        var polyline;

	        function getCarIcon(status) {
	            var ringClass = status === 'N2' ? 'ring-blink-red' : 'ring-blink-green';
	            return L.divIcon({
	                className: 'custom-icon ring-blink ' + ringClass,
	                html: `<div class="ring-blink">
	                          <img src="${status === 'N2' ? 'THINTURE_IMAGE/red2.png' : 'THINTURE_IMAGE/greencar2.png'}" 
	                          alt="car-icon" style="width: 38px; height: 38px;">
	                       </div>`,
	                iconSize: [38, 38],
	                iconAnchor: [19, 19],
	                popupAnchor: [0, -19]
	            });
	        }

	        function fetchAndUpdateVehicleData(url, isLive = false) {
	            fetch(url)
	                .then(response => {
	                    if (!response.ok) {
	                        throw new Error('Network response was not ok ' + response.statusText);
	                    }
	                    return response.json();
	                })
	                .then(data => {
	                    if (Array.isArray(data)) {
	                        data.forEach(vehicle => {
	                            createOrUpdateMarker(vehicle, isLive);
	                        });
	                    } else {
	                        console.error('Data is not an array or no data available');
	                    }
	                })
	                .catch(error => console.error('Error fetching vehicle data:', error));
	        }

	        function onShowButtonClick() {
	            console.log('Show button clicked');
	            const deviceId = getSelectedDeviceId();
	            if (deviceId) {
	                console.log(`Device ID selected: ${deviceId}`);
	                replayVehicle(deviceId);
	            } else {
	                console.error('No device ID found.');
	            }
	        }

	        function getSelectedDeviceId() {
	            const selectedMarker = Object.values(markerDict).find(marker => marker.isSelected);
	            if (selectedMarker) {
	                console.log(`Selected Marker Device ID: ${selectedMarker.deviceId}`);
	            } else {
	                console.warn('No marker is selected.');
	            }
	            return selectedMarker ? selectedMarker.deviceId : null;
	        }

	        function replayVehicle(deviceId) {
	            console.log(`Starting replay for vehicle: ${deviceId}`);
	            document.getElementById('replay-panel').style.display = 'block';
	            const fromDateInput = document.getElementById('from-date').value.trim();
	            const toDateInput = document.getElementById('to-date').value.trim();

	            if (!fromDateInput || !toDateInput) {
	                alert('Please select both From and To dates.');
	                console.warn('Date inputs are missing.');
	                return;
	            }

	            const fromDate = new Date(fromDateInput).toISOString();
	            const toDate = new Date(toDateInput).toISOString();
	            console.log(`Fetching data from: ${fromDate} to: ${toDate}`);

	            fetch(`/api/history/${deviceId}?from=${fromDate}&to=${toDate}`)
	                .then(response => {
	                    if (!response.ok) {
	                        throw new Error('Network response was not ok ' + response.statusText);
	                    }
	                    return response.json();
	                })
	                .then(data => {
	                    if (Array.isArray(data) && data.length > 0) {
	                        populateReplayPanel(data);
	                        window.replayData = data;
	                        console.log('Replay data is set:', window.replayData);
	                    } else {
	                        alert('No historical data available for this vehicle.');
	                        console.error('No historical data returned from the API.');
	                    }
	                })
	                .catch(error => console.error(`Error fetching historical data for ${deviceId}:`, error));
	        }

	        function startReplayAction() {
	            console.log('Play button clicked');
	            const replayData = window.replayData;
	            if (replayData) {
	                console.log('Replay data available:', replayData);
	                startReplay(replayData);
	            } else {
	                console.error('No replay data available. Please load data first.');
	                alert('Please click the "Show" button to load data before playing.');
	            }
	        }

	        function populateReplayPanel(data) {
	            const fromDate = document.getElementById('from-date');
	            const toDate = document.getElementById('to-date');
	            const replayTime = document.getElementById('replay-time');

	            fromDate.value = new Date(data[0].timestamp).toISOString().substring(0, 10);
	            toDate.value = new Date(data[data.length - 1].timestamp).toISOString().substring(0, 10);
	            replayTime.textContent = "00:00:00";
	            console.log('Replay panel populated with data range.');
	        }

	        function startReplay(historyData) {
	            console.log('Starting replay with data:', historyData);
	            map.eachLayer(function (layer) {
	                if (layer instanceof L.Marker || layer instanceof L.Polyline) {
	                    map.removeLayer(layer);
	                }
	            });

	            let currentIndex = 0;
	            const replaySpeed = 1000;
	            const routeCoordinates = [];

	            historyData.forEach(data => {
	                routeCoordinates.push([data.latitude, data.longitude]);
	            });

	            polyline = L.polyline(routeCoordinates, { color: 'blue', weight: 5, opacity: 0.7 }).addTo(map);

	            function updatePosition() {
	                if (currentIndex >= historyData.length) {
	                    console.log('Replay finished');
	                    clearInterval(replayInterval);
	                    return;
	                }

	                const vehicle = historyData[currentIndex];
	                if (currentIndex < historyData.length - 1) {
	                    const nextVehicle = historyData[currentIndex + 1];
	                    getRouteAndAnimate([vehicle.latitude, vehicle.longitude], [nextVehicle.latitude, nextVehicle.longitude], vehicle.deviceId);
	                }
	                currentIndex++;
	            }

	            const replayInterval = setInterval(updatePosition, replaySpeed);
	            console.log('Replay started.');
	        }

	        function getRouteAndAnimate(start, end, carId) {
	            console.log('Fetching route for animation...');
	            var osrmURL = `https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`;

	            fetch(osrmURL)
	                .then(response => response.json())
	                .then(data => {
	                    if (!data.routes || data.routes.length === 0) {
	                        console.error('No routes found');
	                        return;
	                    }

	                    var route = data.routes[0].geometry.coordinates;
	                    var latLngRoute = route.map(coord => [coord[1], coord[0]]);

	                    L.polyline(latLngRoute, {
	                        color: 'blue',
	                        weight: 5,
	                        opacity: 0.7
	                    }).addTo(map);

	                    if (carMarkers[carId]) {
	                        animateCar(carMarkers[carId], latLngRoute);
	                    } else {
	                        carMarkers[carId] = L.marker(latLngRoute[0], { icon: getCarIcon('N1') }).addTo(map);
	                        animateCar(carMarkers[carId], latLngRoute);
	                    }
	                })
	                .catch(error => console.error('Error fetching route:', error));
	        }

	        function animateCar(carMarker, route) {
	            console.log('Starting car animation along the route.');
	            let index = 0;
	            let startTime = null;

	            function moveCar(timestamp) {
	                if (!startTime) startTime = timestamp;

	                if (index < route.length - 1) {
	                    let currentPoint = route[index];
	                    let nextPoint = route[index + 1];
	                    let distance = map.distance(currentPoint, nextPoint);
	                    let moveDuration = distance / 100 * 1000;
	                    let elapsedTime = timestamp - startTime;
	                    let fraction = Math.min(elapsedTime / moveDuration, 1);

	                    let latLng = [
	                        currentPoint[0] + fraction * (nextPoint[0] - currentPoint[0]),
	                        currentPoint[1] + fraction * (nextPoint[1] - currentPoint[1])
	                    ];

	                    carMarker.setLatLng(latLng);
	                    carMarker.setIcon(L.divIcon({
	                        className: 'custom-icon ring-blink ring-blink-green',
	                        html: `<div style="transform: rotate(${calculateAngle(currentPoint, nextPoint)}deg);">
	                                <img src="THINTURE_IMAGE/greencar2.png" class="car-icon">
	                            </div>`,
	                        iconSize: [55, 55],
	                        iconAnchor: [25, 25]
	                    }));

	                    if (fraction < 1) {
	                        requestAnimationFrame(moveCar);
	                    } else {
	                        startTime = null;
	                        index++;
	                        setTimeout(() => requestAnimationFrame(moveCar), 20);
	                    }
	                } else {
	                    carMarker.setLatLng(route[route.length - 1]);
	                    carMarker.setIcon(getCarIcon('N2'));
	                    console.log('Car animation finished.');
	                }
	            }

	            requestAnimationFrame(moveCar);
	        }

	        function calculateAngle(startPoint, endPoint) {
	            return Math.atan2(endPoint[1] - startPoint[1], endPoint[0] - startPoint[0]) * 180 / Math.PI;
	        }

	        // Add event listeners
	        document.getElementById('show-replay').addEventListener('click', onShowButtonClick);
	        document.getElementById('play-replay').addEventListener('click', startReplayAction);
	    
		
		
		
		

	    function createOrUpdateMarker(vehicle, isLive = false) {
	        if (!vehicle.latitude || !vehicle.longitude) {
	            console.error('Invalid latitude or longitude for vehicle:', vehicle);
	            return;
	        }
			
			
			
			

	        var deviceId = vehicle.deviceId || 'Unknown';

	        console.log('Creating or updating marker for vehicle ID:', deviceId);

	        var icon = getCarIcon(vehicle.status);
	        var popupContent = `
	            <div style="min-width: 200px;">
	                <strong>Device ID:</strong> ${deviceId}<br>
	                <strong>Timestamp:</strong> ${vehicle.timestamp}<br>
	                <strong>Address:</strong> ${vehicle.address || 'Address not available'}<br>
	                <strong>Latitude:</strong> ${vehicle.latitude}<br>
	                <strong>Longitude:</strong> ${vehicle.longitude}<br>
	                <strong>Status:</strong> ${vehicle.status === 'N2' ? 'Ignition Off' : 'Ignition On'}<br>
	                <strong>Type:</strong> ${isLive ? 'Live' : 'Last Known'}
	                <div style="margin-top: 10px; text-align: center;">
	                    <button style="padding: 5px 10px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;" 
	                    onclick="replayVehicle('${deviceId}')">Replay</button>
	                    <button style="padding: 5px 10px; background-color: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer;" 
	                    onclick="showVehicleDetails('${deviceId}')">Details</button>
						
						
						
						
	                </div>
	            </div>
	        `;

	        if (markerDict[deviceId]) {
	            markerDict[deviceId].setLatLng([vehicle.latitude, vehicle.longitude])
	                .setIcon(icon)
	                .bindPopup(popupContent)
	                .openPopup();
	        } else {
	            markerDict[deviceId] = L.marker([vehicle.latitude, vehicle.longitude], { icon: icon })
	                .bindPopup(popupContent)
	                .on('click', function () {
	                    showVehicleDetails(deviceId);
	                })
	                .addTo(map)
	                .openPopup();
	            markers.addLayer(markerDict[deviceId]);
	        }

	        deviceLastUpdate[deviceId] = Date.now();
	    }

	    fetchAndUpdateVehicleData('/api/vehicles/last-known');

		// Establish the WebSocket connection
		var socket = new SockJS('/gs-guide-websocket');
		var stompClient = Stomp.over(socket);

		// Function to initialize WebSocket connection and handle real-time updates
		function initializeWebSocket() {
		    stompClient.connect({}, function (frame) {
		        console.log('Connected to WebSocket:', frame);

		        // Subscribe to the location updates topic
		        stompClient.subscribe('/topic/location-updates', function (locationUpdate) {
		            var data = JSON.parse(locationUpdate.body);
		            console.log('Received WebSocket data:', data);

		            if (!data.deviceId || data.deviceId.trim() === "") {
		                console.warn('Received update with missing deviceId:', data);
		                data.deviceId = 'Unknown';
		            }

		            // Update marker on the map with the received data
		            createOrUpdateMarker(data, true);

		            // Optionally, adjust the zoom level or center the map if needed
		            adjustMapZoomAndCenter(data);
		        });
		    });
		}

		// Function to create or update a marker for a vehicle
		function createOrUpdateMarker(vehicle, isLive = false) {
		    if (!vehicle.latitude || !vehicle.longitude) {
		        console.error('Invalid latitude or longitude for vehicle:', vehicle);
		        return;
		    }

		    var deviceId = vehicle.deviceId || 'Unknown';

		    console.log('Creating or updating marker for vehicle ID:', deviceId);

			var icon = getCarIcon(vehicle.status);
			var popupContent = `
			    <div style="min-width: 200px;">
			        <strong>Device ID:</strong> ${deviceId}<br>
			        <strong>Timestamp:</strong> ${vehicle.timestamp}<br>
			        <strong>Address:</strong> ${vehicle.address || 'Address not available'}<br>
			        <strong>Latitude:</strong> ${vehicle.latitude}<br>
			        <strong>Longitude:</strong> ${vehicle.longitude}<br>
			        <strong>Status:</strong> ${vehicle.status === 'N2' ? 'Ignition Off' : 'Ignition On'}<br>
			        <strong>Type:</strong> ${isLive ? 'Live' : 'Last Known'}
			        <div style="margin-top: 10px; text-align: center;">
						<button style="padding: 5px 10px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;" 
						        onclick="navigateToReplay('${deviceId}')">
						    Replay
						</button>
			              
			            </button>
						<button type="button" style="padding: 5px 10px; background-color: red; color: white; border: none; border-radius: 5px; cursor: pointer;" 
						        onclick="openSideTab()">
						    <i class="fas fa-video"></i> Live
						</button>
			            <button style="padding: 5px 10px; background-color: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer;" 
			                    onclick="showVehicleDetails('${deviceId}')">Details</button>
			        </div>
			    </div>
			`;

			// Define the openReplayPage function
			
			
						
		    if (markerDict[deviceId]) {
		        markerDict[deviceId].setLatLng([vehicle.latitude, vehicle.longitude])
		            .setIcon(icon)
		            .bindPopup(popupContent)
		            .openPopup();
		    } else {
		        markerDict[deviceId] = L.marker([vehicle.latitude, vehicle.longitude], { icon: icon })
		            .bindPopup(popupContent)
		            .on('click', function () {
		                showVehicleDetails(deviceId);
		            })
		            .addTo(map)
		            .openPopup();
		        markers.addLayer(markerDict[deviceId]);
		    }

		    deviceLastUpdate[deviceId] = Date.now();
		}

		// Function to adjust zoom level and center the map based on incoming data
		function adjustMapZoomAndCenter(data) {
		    var latLng = [data.latitude, data.longitude];

		    // Check if the marker is already within the visible bounds of the map
		    if (!map.getBounds().contains(latLng)) {
		        map.setView(latLng, Math.min(map.getZoom(), 40)); // Set zoom level if the marker is out of bounds
		    }
		}

		// Initialize WebSocket connection
		initializeWebSocket();

	    function checkInactiveDevices() {
	        var now = Date.now();
	        liveDevices.forEach(deviceId => {
	            if (now - deviceLastUpdate[deviceId] > inactivityThreshold) {
	                console.log('Device became inactive:', deviceId);
	                liveDevices.delete(deviceId);
	                fetchAndUpdateVehicleData(`/api/vehicles/last-known/${deviceId}`);
	            }
	        });
	    }

	    setInterval(checkInactiveDevices, inactivityThreshold);

	</script>

	
	
	<script>
	// Function to handle the search button click
	function searchVehicleById() {
	    const deviceId = document.getElementById('search-input').value.trim();
	    
	    if (!deviceId) {
	        alert('Please enter a Device ID.');
	        return;
	    }

	    console.log(`Searching for vehicle with Device ID: ${deviceId}`);

	    // Fetch vehicle details from the backend API
	    fetch(`/api/vehicle/details/${deviceId}`)
	        .then(response => {
	            if (response.ok) {
	                return response.json();
	            } else {
	                throw new Error('Vehicle not found.');
	            }
	        })
	        .then(data => {
	            console.log('Fetched vehicle details:', data); // Log the data

	            if (data) {
	                // Display vehicle details in a popup or a dedicated panel
	                const vehicleDetailsPanel = document.getElementById('vehicle-details');
	                vehicleDetailsPanel.innerHTML = `
	                    <h3>Vehicle Details</h3>
	                    <p><strong>Device ID:</strong> ${data.deviceId}</p>
	                    <p><strong>Timestamp:</strong> ${data.timestamp}</p>
	                    <p><strong>Address:</strong> ${data.address || 'Address not available'}</p>
	                    <p><strong>Latitude:</strong> ${data.latitude}</p>
	                    <p><strong>Longitude:</strong> ${data.longitude}</p>
	                    <p><strong>Status:</strong> ${data.status}</p>
	                `;
	                vehicleDetailsPanel.style.display = 'block'; // Show the panel
	                
	                // Center map on the fetched vehicle location
	                if (data.latitude && data.longitude) {
	                    const vehicleLatLng = [data.latitude, data.longitude];
	                    map.setView(vehicleLatLng, 13); // Adjust the zoom level as needed

	                    // Add or update marker on the map
	                    if (markerDict[data.deviceId]) {
	                        markerDict[data.deviceId].setLatLng(vehicleLatLng).openPopup();
	                    } else {
	                        const marker = L.marker(vehicleLatLng, { icon: getCarIcon(data.status) })
	                            .bindPopup(`
	                                <strong>Device ID:</strong> ${data.deviceId}<br>
	                                <strong>Status:</strong> ${data.status}<br>
	                                <button onclick="replayVehicle('${data.deviceId}')">Replay</button>
	                                <button onclick="showVehicleDetails('${data.deviceId}')">Details</button>
	                            `)
	                            .addTo(map)
	                            .openPopup();

	                        markerDict[data.deviceId] = marker; // Store the marker in the dictionary
	                    }
	                } else {
	                    alert('Location data not available for this vehicle.');
	                }
	            } else {
	                alert('No details available for this vehicle.');
	            }
	        })
	        .catch(error => {
	            console.error(`Error fetching vehicle details: ${error.message}`);
	            alert('Error: ' + error.message);
	        });
	}

		        alert('No Device ID found');

		var opts = {
		        angle: 0, // The span of the gauge
		        lineWidth: 0.3, // The gauge's thickness
		        radiusScale: 1, // Relative radius
		        pointer: {
		            length: 0.6, // Relative to gauge radius
		            strokeWidth: 0.05, // Thickness
		            color: '#000000' // Pointer color
		        },
		        limitMax: false,     // If false, max value increases automatically if value > maxValue
		        limitMin: false,     // If true, the min value of the gauge will be fixed
		        colorStart: '#6FADCF',   // Colors
		        colorStop: '#8FC0DA',    // just experiment with them
		        strokeColor: '#E0E0E0',  // to see which ones work best for you
		        generateGradient: true,
		        highDpiSupport: true,     // High resolution support
		    };

		    var target = document.getElementById('speedometer'); // Canvas element where speedometer is rendered
		    var gauge = new Gauge(target).setOptions(opts); // Create gauge object
		    gauge.maxValue = 180; // Set max speed value (e.g., 180 km/h)
		    gauge.setMinValue(0);  // Set min value (0 km/h)
		    gauge.animationSpeed = 32; // Set animation speed
		    gauge.set(0); // Initial value of the gauge

		    // Function to simulate dynamic speed updates
		    function updateSpeed(newSpeed) {
		        gauge.set(newSpeed); // Update the speed on the gauge
		    }

		    // Example: Simulating speed updates every 2 seconds
		    setInterval(function() {
		        var randomSpeed = Math.floor(Math.random() * 180); // Generate random speed between 0 and 180
		        updateSpeed(randomSpeed);
		    }, 2000);
