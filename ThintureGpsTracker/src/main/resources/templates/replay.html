<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Replay</title>
    <link rel="stylesheet" href="styles.css"> <!-- Add your CSS file here -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

	<style>
		body{
			background-color: aliceblue;
		}
		.panel{
			position: relative;
			top:130px;
			width:52%;
		
			left:20%;
			background-color:white;
			
			border: 5px solid gray;
			box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
			
		}
		#map{
			height: 350px;
			top:190px;
			width:900px;
			left:20%;
		}
		input{
			padding: 12px;
				    border: 2px solid #ddd;
				    border-radius: 6px;
				    font-size: 14px;
				    box-sizing: border-box;
					width: 15%;
					height:2px;
		}
		.button{
			
			color:white;
			background-color: darkblue;
		}
		h2{
			text-align: center;
						    font-size: 3em; /* Adjust size as needed */
							font-weight: 400;
						    color:darkblue; /* Text color */
						    text-shadow: 
							1px 1px 2px rgba(0, 0, 0, 0.4), /* First shadow for initial depth */
							        3px 3px 5px rgba(0, 0, 0, 0.8), /* Slightly darker shadow for increased depth */
							        6px 6px 8px rgba(0, 0, 0, 0.1); /* Darker shadow for stronger 3D effect */
							
		}
		#back-button {
		            position: absolute;
		            top: 120px;
		            left: 10px;
		            background-color: darkred;
		            color: white;
		        }
	</style>
</head>
<body>
	<button class="button" id="back-button">
	       <i class="fas fa-arrow-left"></i> Back
	   </button>
    <!-- Replay Panel -->
    <div id="replay-panel" class="panel">
		<h2>History</h2>
        <div>
            <label for="device-id">Device ID:</label>
            <input type="text" id="device-id" value="">
        </div>
        <div>
            <label for="from-date">From:</label>
            <input type="datetime-local" id="from-date">
            <label for="to-date">To:</label>
            <input type="datetime-local" id="to-date">
			<button class="button" id="show-replay">
			    <i class="fas fa-play"></i> Show
			</button>

        </div>
		<div>
		    <label>
		        <input type="checkbox" id="show-trail"> Trail
		    </label>
		    <select id="replay-speed">
		        <option value="normal">Normal</option>
		        <option value="fast">Fast</option>
		        <option value="slow">Slow</option>
		    </select>
		</div>
		<div>
		    <button id="play-replay" disabled class="button">Play</button>
		    <input type="range" id="replay-slider" min="0" max="100" value="0" style="width: 70%;">
		    <span id="replay-time">00:00:00</span>
		</div>

		<div id="map" style="height: 500px;"></div>

		<script>
			var map = L.map('map').setView([12.225284, 79.074699], 5);
			L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
			    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
			}).addTo(map);

			var carMarker;
			var routePolyline;
			var replayData = [];
			var currentIndex = 0;
			var replayInterval;

			// Create a Leaflet control to display the total distance
			var distanceControl = L.control({ position: 'topright' });
			distanceControl.onAdd = function() {
			    this._div = L.DomUtil.create('div', 'leaflet-control-distance');
			    this.update();
			    return this._div;
			};
			distanceControl.update = function(totalDistance) {
			    this._div.innerHTML = 'Total Distance: ' + (totalDistance ? totalDistance.toFixed(2) + ' km' : '0 km');
			};
			distanceControl.addTo(map);

			// Function to fetch vehicle history from the backend
			function fetchVehicleHistory(deviceID, fromDate, toDate) {
			    console.log(`Fetching history for Device ID: ${deviceID}, From: ${fromDate}, To: ${toDate}`);
			    
			    fetch(`/api/vehicle/history/${deviceID}?from=${fromDate}&to=${toDate}`)
			        .then(response => {
			            if (!response.ok) {
			                throw new Error(`HTTP error! Status: ${response.status}`);
			            }
			            return response.json();
			        })
			        .then(data => {
			            console.log('Fetched vehicle history:', data);

			            // Check if data is in the expected format
			            if (data && Array.isArray(data)) {
			                replayData = data
			                    .map(d => [d.latitude, d.longitude])
			                    .filter(coords => coords[0] !== null && coords[1] !== null);
			                
			                console.log('Parsed replay data:', replayData);

			                if (replayData.length > 0) {
			                    drawPolyline(replayData);
			                    document.getElementById('replay-slider').max = replayData.length - 1;
			                    document.getElementById('play-replay').disabled = false;
			                } else {
			                    alert('No valid data points found for drawing.');
			                }
			            } else {
			                alert('Unexpected data format received from the backend.');
			            }
			        })
			        .catch(error => {
			            console.error('Error fetching vehicle history:', error);
			            alert('Error fetching vehicle history: ' + error.message);
			        });
			}

			// Function to draw polyline on the map using fetched data
			function drawPolyline(routeData) {
			    if (routePolyline) {
			        map.removeLayer(routePolyline);
			    }

			    routePolyline = L.polyline(routeData, { color: 'blue', weight: 5, opacity: 0.7 }).addTo(map);

			    if (carMarker) {
			        map.removeLayer(carMarker);
			    }

			    let initialAngle = 0;
			    carMarker = L.marker(routeData[0], {
			        icon: L.divIcon({
			            className: 'custom-icon ring-blink ring-blink-green',
			            html: `<div style="transform: rotate(${initialAngle}deg);">
			                       <img src="/THINTURE_IMAGE/greencar2.png" class="car-icon" style="width: 30px; height: 30px;">
			                   </div>`,
			            iconSize: [30, 30],
			            iconAnchor: [15, 15]
			        })
			    }).addTo(map);
			}

			// Function to start the replay
			function startReplay() {
			    if (replayData.length === 0) {
			        alert('No replay data available. Please load data first.');
			        return;
			    }

			    var replaySpeed = document.getElementById('replay-speed').value;
			    var speed = replaySpeed === 'fast' ? 500 : replaySpeed === 'slow' ? 2000 : 1000;

			    currentIndex = 0;
			    clearInterval(replayInterval);
			    replayInterval = setInterval(() => {
			        if (currentIndex >= replayData.length) {
			            clearInterval(replayInterval);
			            console.log("Replay finished");
			            return;
			        }

			        let [lat, lng] = replayData[currentIndex];
			        updateMarkerPosition(lat, lng);

			        if (currentIndex < replayData.length - 1) {
			            let nextPoint = replayData[currentIndex + 1];
			            let angle = calculateAngle([lat, lng], nextPoint);

			            carMarker.setIcon(L.divIcon({
			                className: 'custom-icon ring-blink ring-blink-green',
			                html: `<div style="transform: rotate(${angle}deg);">
			                           <img src="THINTURE_IMAGE/greencar2.png" class="car-icon" style="width: 30px; height: 30px;">
			                       </div>`,
			                iconSize: [30, 30],
			                iconAnchor: [15, 15]
			            }));
			        }

			        document.getElementById('replay-slider').value = currentIndex;
			        document.getElementById('replay-time').textContent = new Date().toLocaleTimeString();

			        currentIndex++;
			    }, speed);
			}

			// Update marker position
			function updateMarkerPosition(lat, lng) {
			    if (carMarker) {
			        carMarker.setLatLng([lat, lng]);
			    }
			}

			function calculateAngle(startPoint, endPoint) {
			    return Math.atan2(endPoint[1] - startPoint[1], endPoint[0] - startPoint[0]) * 180 / Math.PI;
			}

			// Event listeners for user actions
			document.getElementById('show-replay').addEventListener('click', function() {
			    var deviceID = document.getElementById('device-id').value.trim();
			    var fromDate = document.getElementById('from-date').value;
			    var toDate = document.getElementById('to-date').value;

			    if (!deviceID || !fromDate || !toDate) {
			        alert('Please enter a device ID and select both From and To dates.');
			        return;
			    }

			    fromDate = new Date(fromDate).toISOString();
			    toDate = new Date(toDate).toISOString();

			    console.log(`Requesting history for deviceID: ${deviceID} from: ${fromDate} to: ${toDate}`);

			    fetchVehicleHistory(deviceID, fromDate, toDate);
			});

			document.getElementById('play-replay').addEventListener('click', startReplay);

		</script>

	<script>
	        // Function to extract the query parameter from the URL
	        function getQueryParam(param) {
	            const urlParams = new URLSearchParams(window.location.search);
	            return urlParams.get(param);
	        }

	        document.addEventListener('DOMContentLoaded', function() {
	            // Get deviceId from the URL query parameter
	            var deviceId = getQueryParam('deviceId');

	            // If deviceId exists in the URL, set it in the input field
	            if (deviceId) {
	                document.getElementById('device-id').value = deviceId;
	            }
	        });
			
			
			// Function to go back to the previous page
			      document.getElementById('back-button').addEventListener('click', function() {
			          window.history.back();
			      });
	    </script>

</body>
</html>
