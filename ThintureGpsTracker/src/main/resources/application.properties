spring.application.name=ThintureGpsTracker
mqtt.broker-url=tcp://3.109.116.92:1883
mqtt.client-id=spring-client
mqtt.topic=Test
mqtt.username=Thinture
mqtt.password=Thinture24

# Set the root log level
logging.level.root=INFO

# Set the log level for specific packages
logging.level.com.ThintureGpsTracker=DEBUG

# Specify the log file path
logging.file.name=logs/thinture-gps-tracker.log

# Log pattern for console output
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Log pattern for file output
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

spring.main.allow-bean-definition-overriding=true
server.port=8181

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
//spring.thymeleaf.mode=HTML5
spring.thymeleaf.encoding=UTF-8
spring.jpa.open-in-view=false
spring.thymeleaf.mode=HTML


spring.datasource.url=jdbc:mysql://3.109.116.92:3306/ThintureGpsTrackerDB
spring.datasource.username=admin
spring.datasource.password=Thinture
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
